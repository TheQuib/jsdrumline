{{ $src := .Get "src" }}
{{ $label := .Get "label" }}
{{ $border := .Get "border" | default "1" }}
{{ $radius := .Get "radius" | default "12" }}

<style>
  .audio-player {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-width: 460px;
    background: rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(14px);
    border-style: solid;
    border-width: {{ $border }}px;
    border-radius: {{ $radius }}px;
    transition: box-shadow 0.25s ease-in-out, border-color 0.25s ease-in-out;
  }

  html:not(.dark) .audio-player {
    border-color: rgba(0, 0, 0, 0.25);
    color: black;
  }

  html.dark .audio-player {
    border-color: rgba(255, 255, 255, 0.25);
    color: white;
    background: rgba(0, 0, 0, 0.25);
  }

  .audio-player:hover {
    box-shadow: 0 0 18px rgba(0, 0, 0, 0.15);
  }

  .audio-player .play-btn {
    border: none;
    border-radius: 50%;
    width: 42px;
    height: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  html:not(.dark) .audio-player .play-btn {
    background: black;
  }

  html.dark .audio-player .play-btn {
    background: white;
  }

  html:not(.dark) .audio-player .play-btn svg {
    fill: white;
  }

  html.dark .audio-player .play-btn svg {
    fill: black;
  }

  .audio-player input[type=range] {
    accent-color: currentColor;
  }

  .audio-player .label-link {
    font-weight: bold;
    font-size: 1.1rem;
    text-decoration: none;
    transition: opacity 0.2s;
  }

  .audio-player .label-link:hover {
    opacity: 0.7;
  }

  .audio-player .time {
    font-family: monospace;
    min-width: 40px;
  }
</style>

<div class="audio-player">
  <a href="{{ $src }}" download class="label-link text-black dark:text-white">
    {{ $label }}
  </a>

  <div class="flex items-center gap-3 mt-2">
    <button class="play-btn">
      <svg class="play-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20">
        <path d="M8 5v14l11-7z"/>
      </svg>
    </button>
    <input type="range" class="progress flex-1 accent-black dark:accent-white">
    <span class="time text-sm text-black dark:text-white">0:00</span>
  </div>

  <div class="flex items-center gap-2 mt-2">
    <label class="text-sm text-black dark:text-white">🔊</label>
    <input type="range" class="volume flex-1 accent-black dark:accent-white" min="0" max="1" step="0.01" value="1">
  </div>

  <audio src="{{ $src }}"></audio>
</div>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.audio-player').forEach(player => {
      const audio = player.querySelector('audio');
      const playBtn = player.querySelector('.play-btn');
      const playIcon = playBtn.querySelector('svg');
      const progress = player.querySelector('.progress');
      const time = player.querySelector('.time');
      const volume = player.querySelector('.volume');

      playBtn.addEventListener('click', () => {
        if (audio.paused) {
          document.querySelectorAll('audio').forEach(a => { if (a !== audio) a.pause(); });
          audio.play();
          playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
        } else {
          audio.pause();
          playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
        }
      });

      audio.addEventListener('timeupdate', () => {
        const percent = (audio.currentTime / audio.duration) * 100;
        progress.value = percent || 0;
        const mins = Math.floor(audio.currentTime / 60);
        const secs = Math.floor(audio.currentTime % 60).toString().padStart(2, '0');
        time.textContent = `${mins}:${secs}`;
      });

      progress.addEventListener('input', () => {
        audio.currentTime = (progress.value / 100) * audio.duration;
      });

      volume.addEventListener('input', () => {
        audio.volume = volume.value;
      });
    });
  });
</script>
